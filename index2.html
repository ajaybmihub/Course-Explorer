<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPath — India Govt Exams Directory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090E;--bg2:#0D1117;--bgc:#121820;--bge:#1A2332;
  --acc:#FF2D55;--acc-d:rgba(255,45,85,.13);--acc-b:rgba(255,45,85,.3);
  --bdr:rgba(255,255,255,.06);--bdr-h:rgba(255,255,255,.12);
  --t1:#E8EDF5;--t2:#CBD5E1;--tm:#94A3B8;
  --green:#00D68F;--gd:rgba(0,214,143,.1);--gb:rgba(0,214,143,.2);
  --yellow:#FFB800;--yd:rgba(255,184,0,.1);--yb:rgba(255,184,0,.2);
  --red:#FF4D4D;--rd:rgba(255,77,77,.1);--rb:rgba(255,77,77,.2);
  --blue:#4D9EFF;--bd:rgba(77,158,255,.1);--bb:rgba(77,158,255,.2);
  --purple:#A78BFA;--pd:rgba(167,139,250,.1);--pb:rgba(167,139,250,.2);
  --teal:#2DD4BF;--td:rgba(45,212,191,.1);--tb:rgba(45,212,191,.2);
  --orange:#FB923C;--od:rgba(251,146,60,.1);--ob:rgba(251,146,60,.2);
  --pink:#F472B6;--pkd:rgba(244,114,182,.1);--pkb:rgba(244,114,182,.2);
  --sky:#38BDF8;--skd:rgba(56,189,248,.1);--skb:rgba(56,189,248,.2);
  --lime:#A3E635;--ld:rgba(163,230,53,.1);--lb:rgba(163,230,53,.2);
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}

/* ── PAGE ── */
.page{width:100%;min-height:100vh;padding:44px 52px 72px;animation:fadeIn .5s var(--ease) both}
.ph{margin-bottom:32px;animation:fadeUp .5s .05s var(--ease) both}
.plabel{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:10px}
.plabel::before{content:'';display:inline-block;width:18px;height:1px;background:var(--acc)}
.plabel::after{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--acc);margin-left:2px;box-shadow:0 0 6px var(--acc);animation:pulse 2s infinite}
.ptitle{font-size:26px;font-weight:700;color:var(--t1);line-height:1.2;letter-spacing:-.4px}
.ptitle em{font-style:normal;color:var(--acc);text-shadow:0 0 22px rgba(255,45,85,.3)}
.psub{font-size:13.5px;color:var(--t2);margin-top:7px;line-height:1.6}

/* ── NAV BTN ── */
.nav-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  background: var(--acc);
  color: #fff;
  text-decoration: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  transition: transform 0.2s, background 0.2s;
  margin-top: 20px;
}
.nav-btn:hover { transform: translateY(-2px); background: #ff4d6d; }
.nav-btn svg { width: 14px; height: 14px; }

/* ── STATS ── */
.stats{display:flex;gap:16px;margin-top:20px;flex-wrap:wrap}
.stat{background:var(--bgc);border:1px solid var(--bdr);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:12px;transition:border-color .2s,transform .15s var(--spring)}
.stat:hover{border-color:var(--bdr-h);transform:translateY(-1px)}
.stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon svg{width:15px;height:15px}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--acc);line-height:1}
.stat-lbl{font-size:10.5px;color:var(--t2);font-weight:500;margin-top:2px}

/* ── CARD ── */
.card{background:var(--bgc);border-radius:16px;border:1px solid var(--bdr);overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.02),0 8px 32px rgba(0,0,0,.4);animation:fadeUp .5s .1s var(--ease) both}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--bg2);padding:0 6px;overflow-x:auto;gap:1px;position:sticky;top:0;z-index:10}
.tabs::-webkit-scrollbar{height:3px}
.tabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.tab-btn{display:flex;align-items:center;gap:7px;padding:14px 16px;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;color:var(--tm);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .2s,border-color .2s,background .15s;border-radius:7px 7px 0 0;position:relative}
.ti{width:14px;height:14px;opacity:.35;transition:opacity .2s;flex-shrink:0}
.tab-btn:hover{color:var(--t2);background:rgba(255,255,255,.03)}
.tab-btn:hover .ti{opacity:.6}
.tab-btn.active{color:var(--t1);border-bottom-color:var(--acc);font-weight:600;background:rgba(255,45,85,.04)}
.tab-btn.active .ti{opacity:1}
.tbadge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:1px 6px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--tm);border:1px solid var(--bdr);transition:all .2s}
.tab-btn.active .tbadge{background:var(--acc-d);color:var(--acc);border-color:var(--acc-b)}

/* ── BODY ── */
.tab-body{display:flex;min-height:580px}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--bdr);background:var(--bg2);overflow-y:auto;position:sticky;top:49px;max-height:calc(100vh - 49px);animation:slideR .3s .15s var(--ease) both}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px}
.slabel{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tm);padding:14px 12px 6px;opacity:.7}

/* ── FILTER CHIP ROW ── */
.filter-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px 6px}
.fchip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--bdr);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--tm);transition:all .15s var(--ease);white-space:nowrap}
.fchip:hover{border-color:var(--bdr-h);color:var(--t2);background:var(--bge)}
.fchip.active{background:var(--acc-d);border-color:var(--acc-b);color:var(--acc)}
.fchip svg{width:11px;height:11px;flex-shrink:0}
.fchip-count{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:600;margin-left:2px}

/* ── SIDEBAR ITEMS ── */
.sitem{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;cursor:pointer;border-radius:9px;margin:1px 6px;border:1px solid transparent;transition:background .15s,border-color .15s,transform .12s var(--spring)}
.sitem:hover{background:var(--bge);transform:translateX(2px)}
.sitem.active{background:var(--acc-d);border-color:var(--acc-b);transform:translateX(3px)}
.sil{display:flex;align-items:center;gap:8px;min-width:0}
.siwrap{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,.05);transition:transform .2s var(--spring)}
.siwrap svg{width:13px;height:13px}
.sitem:hover .siwrap,.sitem.active .siwrap{transform:scale(1.1)}
.sname{font-size:11.5px;font-weight:600;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s}
.sitem.active .sname{color:var(--t1)}
.scount{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--tm);margin-top:1px;font-weight:500}
.sitem.active .scount{color:var(--acc)}
.sarr{color:var(--tm);flex-shrink:0;opacity:.25;transition:opacity .15s,transform .15s;width:10px;height:10px}
.sitem.active .sarr{opacity:1;color:var(--acc);transform:translateX(2px)}

/* ── PANEL ── */
.panel{flex:1;overflow-y:auto;background:var(--bgc);display:flex;flex-direction:column}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:4px}

/* ── PANEL HEADER ── */
.phead{display:flex;align-items:center;gap:14px;padding:22px 26px 18px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bgc);z-index:5;animation:fadeUp .28s var(--ease) both}
.picon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,.06)}
.picon svg{width:20px;height:20px}
.ptit{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.2px}
.pdsc{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.4}
.pcnt{margin-left:auto;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--tm);background:var(--bge);padding:4px 12px;border-radius:20px;border:1px solid var(--bdr)}

/* ── SEARCH ── */
.search-wrap{position:relative;padding:16px 26px 0}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 80px 10px 40px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-input::placeholder{color:var(--tm)}
.search-input:focus{border-color:var(--acc-b);box-shadow:0 0 0 3px var(--acc-d)}
.search-ico{position:absolute;left:38px;top:50%;transform:translateY(-50%);color:var(--tm);pointer-events:none}
.search-ico svg{width:14px;height:14px}
.search-cnt{position:absolute;right:38px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tm);background:var(--bge);padding:2px 8px;border-radius:6px;border:1px solid var(--bdr)}

/* ── GRID AREA ── */
.grid-area{padding:16px 26px 28px;flex:1}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:9px}

/* ── EXAM CARD ── */
.ecard{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:11px;cursor:pointer;text-decoration:none;color:inherit;position:relative;overflow:hidden;transition:border-color .2s,background .2s,box-shadow .2s,transform .18s var(--spring);will-change:transform;opacity:0;animation:fadeUp .3s var(--ease) forwards}
.ecard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;background:transparent;border-radius:2px 0 0 2px;transition:background .2s}
.ecard:hover{border-color:var(--bdr-h);background:var(--bge);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.ecard:hover::before{background:var(--acc)}
.ecard:nth-child(1){animation-delay:.03s}.ecard:nth-child(2){animation-delay:.06s}.ecard:nth-child(3){animation-delay:.09s}
.ecard:nth-child(4){animation-delay:.11s}.ecard:nth-child(5){animation-delay:.13s}.ecard:nth-child(6){animation-delay:.15s}
.ecard:nth-child(7){animation-delay:.17s}.ecard:nth-child(8){animation-delay:.19s}.ecard:nth-child(9){animation-delay:.21s}
.ecard:nth-child(10){animation-delay:.23s}.ecard:nth-child(11){animation-delay:.25s}.ecard:nth-child(12){animation-delay:.27s}
.ecard:nth-child(n+13){animation-delay:.29s}

/* Card icon */
.eico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,.06);transition:transform .2s var(--spring)}
.eico svg{width:17px;height:17px}
.ecard:hover .eico{transform:scale(1.1)}
/* Progress */
.prog-wrap{margin-top:12px;padding-top:10px;border-top:1px dashed var(--bdr)}
.prog-info{display:flex;justify-content:space-between;margin-bottom:6px;align-items:center}
.p-cnt{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--acc);display:flex;align-items:center;gap:4px}
.p-cnt::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--acc);box-shadow:0 0 4px var(--acc)}
.p-yr{font-size:9.5px;color:var(--tm);font-weight:500;font-family:'JetBrains Mono',monospace}
.prog-bar{height:4px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden;position:relative}
.prog-fill{height:100%;background:linear-gradient(90deg, var(--acc), #ff5e7e);box-shadow:0 0 8px var(--acc-b);border-radius:10px;transition:width 1s var(--ease)}

.ebody{flex:1;min-width:0}
.ename{font-size:12.5px;font-weight:700;color:var(--t1);line-height:1.35;margin-bottom:5px;transition:color .15s}
.ecard:hover .ename{color:#fff}
.emeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.econd{font-size:10px;color:var(--tm);font-weight:500;display:flex;align-items:center;gap:3px;min-width:0}
.econd svg{width:9px;height:9px;opacity:.5;flex-shrink:0}
.etag{font-size:8.5px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid transparent;white-space:nowrap;flex-shrink:0;letter-spacing:.2px}
.epills{display:flex;gap:5px;flex-wrap:wrap}
.epill{font-size:9px;color:var(--tm);background:var(--bge);border:1px solid var(--bdr);padding:1px 8px;border-radius:20px;font-weight:500;display:flex;align-items:center;gap:3px;white-space:nowrap}
.epill svg{width:8px;height:8px;opacity:.5}
.earrow{width:18px;height:18px;border-radius:50%;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;color:var(--tm);transition:all .2s;flex-shrink:0}
.earrow svg{width:7px;height:7px}
.ecard:hover .earrow{background:var(--acc);border-color:var(--acc);color:#fff;transform:translateX(2px);box-shadow:0 0 8px rgba(255,45,85,.4)}

/* ── EMPTY STATE ── */
.empty-st{text-align:center;padding:60px 20px;color:var(--tm)}
.empty-st svg{width:40px;height:40px;opacity:.2;margin-bottom:14px;display:block;margin-inline:auto}
.empty-title{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty-sub{font-size:12px}

/* ── STATE PSC ── */
.state-wrap{padding:22px 26px;overflow-y:auto;flex:1;width:100%;display:flex;flex-direction:column}
.state-search-wrap{position:relative;margin-bottom:18px}
.state-search{width:100%;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px 10px 40px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s}
.state-search::placeholder{color:var(--tm)}
.state-search:focus{border-color:var(--acc-b);box-shadow:0 0 0 3px var(--acc-d)}
.sstate-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--tm);pointer-events:none}
.sstate-ico svg{width:14px;height:14px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:28px}
.sbtn{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;transition:background .15s,border-color .15s,transform .12s var(--spring);font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:10px}
.sbtn:hover{background:var(--bge);border-color:var(--bdr-h);transform:translateY(-1px)}
.sbtn.active{background:var(--acc-d);border-color:var(--acc-b)}
.sbtn-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bge);border:1px solid var(--bdr);transition:transform .15s var(--spring)}
.sbtn-icon svg{width:12px;height:12px}
.sbtn:hover .sbtn-icon,.sbtn.active .sbtn-icon{transform:scale(1.08)}
.sbtn.active .sbtn-icon{background:rgba(255,45,85,.15);border-color:var(--acc-b)}
.sbn{font-size:11.5px;font-weight:600;color:var(--t2);transition:color .15s}
.sbtn.active .sbn{color:var(--acc)}
.sbc{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tm);margin-top:1px;transition:color .15s}
.sbtn.active .sbc{color:var(--acc)}
.se-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-top:4px}
.se-title{font-size:14px;font-weight:700;color:var(--t1)}
.se-badge{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--acc);background:var(--acc-d);padding:2px 8px;border-radius:20px;border:1px solid var(--acc-b)}
.se-back{background:none;border:1px solid var(--bdr);color:var(--t2);font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 10px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;margin-left:auto}
.se-back svg{width:12px;height:12px}
.se-back:hover{border-color:var(--bdr-h);color:var(--t1);background:var(--bge)}

/* ── COLORS ── */
.ic-blue{background:var(--bd);color:var(--blue)}.ic-green{background:var(--gd);color:var(--green)}
.ic-orange{background:var(--od);color:var(--orange)}.ic-red{background:var(--rd);color:var(--red)}
.ic-yellow{background:var(--yd);color:var(--yellow)}.ic-purple{background:var(--pd);color:var(--purple)}
.ic-teal{background:var(--td);color:var(--teal)}.ic-pink{background:var(--pkd);color:var(--pink)}
.ic-acc{background:var(--acc-d);color:var(--acc)}.ic-sky{background:var(--skd);color:var(--sky)}
.ic-lime{background:var(--ld);color:var(--lime)}

.tg-blue{background:var(--bd);color:var(--blue);border-color:var(--bb)}
.tg-green{background:var(--gd);color:var(--green);border-color:var(--gb)}
.tg-orange{background:var(--od);color:var(--orange);border-color:var(--ob)}
.tg-red{background:var(--rd);color:var(--red);border-color:var(--rb)}
.tg-yellow{background:var(--yd);color:var(--yellow);border-color:var(--yb)}
.tg-purple{background:var(--pd);color:var(--purple);border-color:var(--pb)}
.tg-teal{background:var(--td);color:var(--teal);border-color:var(--tb)}
.tg-sky{background:var(--skd);color:var(--sky);border-color:var(--skb)}

/* HIDDEN */
.hidden{display:none!important}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .page{padding:20px 16px 48px}
  .tab-btn{padding:12px 12px;font-size:11.5px}
  .tbadge{display:none}
  .tab-body{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--bdr);position:static;max-height:none;animation:none;padding:10px}
  .slabel{display:none}
  .sitem{border-radius:100px;padding:6px 12px;margin:2px}
  .siwrap,.scount,.sarr{display:none}
  .panel{min-height:400px}
  .phead{padding:16px 16px 14px}
  .search-wrap{padding:12px 16px 0}
  .grid-area{padding:12px 16px 24px}
  .egrid{grid-template-columns:1fr}
  .sgrid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .state-wrap{padding:16px}
}
</style>
</head>

<!-- ══ SVG SPRITE ══ -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- navigation / ui -->
  <symbol id="s-chevron"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></symbol>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getExamIcon(name) {
  if (EXAM_ICONS[name]) return EXAM_ICONS[name];
  // fuzzy match
  for (const [k, v] of Object.entries(EXAM_ICONS)) {
    if (name.toLowerCase().includes(k.toLowerCase().slice(0,12))) return v;
  }
  return {icon:'s-briefcase', color:'ic-blue'};
}

function makeCard(exam, idx) {
  const {icon, color} = getExamIcon(exam.name);
  const level = exam.level && exam.level!=='nan' ? exam.level : '';
  const elig  = exam.eligibility && exam.eligibility!=='nan' ? exam.eligibility : '';
  const freq  = exam.frequency && exam.frequency!=='nan' ? exam.frequency : '';
  const body  = exam.body && exam.body!=='nan' ? exam.body : '';
  const qns   = exam.questions || 0;
  const yrs   = exam.years || '';
  
  const tagCls = level==='National'?'tg-blue':level==='State'?'tg-orange':'tg-teal';
  const progress = qns ? Math.min(100, Math.max(15, (qns / 30000) * 100)) : 0;

  return `<a class="ecard" href="#" onclick="return false">
    <div class="eico ${color}"><svg><use href="#${icon}"/></svg></div>
    <div class="ebody">
      <div class="ename">${exam.name}</div>
      <div class="emeta">
        ${body?`<span class="econd"><svg><use href="#s-building"/></svg>${body}</span>`:''}
        ${level?`<span class="etag ${tagCls}">${level}</span>`:''}
      </div>
      <div class="epills">
        ${elig?`<span class="epill"><svg><use href="#s-user"/></svg>${elig}</span>`:''}
        ${freq?`<span class="epill"><svg><use href="#s-calendar"/></svg>${freq}</span>`:''}
      </div>
      ${qns ? `
      <div class="prog-wrap">
        <div class="prog-info">
          <span class="p-cnt">${qns.toLocaleString()} Questions</span>
          <span class="p-yr">${yrs}</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width: ${progress}%"></div></div>
      </div>
      ` : ''}
    </div>
    <div class="earrow"><svg><use href="#s-chevron"/></svg></div>
  </a>`;
}

function renderGrid(items, container) {
  if (!items.length) {
    container.innerHTML = `<div class="empty-st"><svg><use href="#s-search"/></svg><div class="empty-title">No exams found</div><div class="empty-sub">Try a different search or filter</div></div>`;
    return;
  }
  container.innerHTML = `<div class="egrid">${items.map((e,i)=>makeCard(e,i)).join('')}</div>`;
  retrigger(container);
}

function retrigger(el) {
  el.querySelectorAll('.ecard').forEach(c=>{c.style.animation='none';void c.offsetHeight;c.style.animation='';});
}

// ─── STATE PER-TAB ───────────────────────────────────────────────────────────
let activeTab   = 'upsc';
let activeFilter = {};   // {tabId: {subcat, search}}

function getBaseItems(tabId) {
  const cfg = TABS[tabId];
  if (cfg.key === '_states') return [];
  return EXAM_DATA[cfg.key] || [];
}

function getFilteredItems(tabId) {
  const base = getBaseItems(tabId);
  const f    = activeFilter[tabId] || {};
  let items  = base;

  // Subcat filter
  if (f.subcat && f.subcat !== 'all') {
    const sc = (SUBCATS[tabId]||[]).find(s=>s.id===f.subcat);
    if (sc) {
      if (sc.level)       items = items.filter(e=>e.level===sc.level);
      else if (sc.eligibility) items = items.filter(e=>e.eligibility===sc.eligibility);
      else if (sc.keys)   items = items.filter(e=>sc.keys.some(k=>e.name.toLowerCase().includes(k.toLowerCase())||
                                                                  (e.body||'').toLowerCase().includes(k.toLowerCase())));
    }
  }

  // Search
  if (f.search) {
    const q = f.search.toLowerCase();
    items = items.filter(e=>
      (e.name||'').toLowerCase().includes(q)||
      (e.body||'').toLowerCase().includes(q)||
      (e.eligibility||'').toLowerCase().includes(q)||
      (e.frequency||'').toLowerCase().includes(q)
    );
  }
  return items;
}

// ─── BUILD TABS ──────────────────────────────────────────────────────────────
function buildAll() {
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>switchTab(btn.dataset.tab, btn));
  });

  const container = document.getElementById('tabContent');
  let html = '';

  Object.entries(TABS).forEach(([tabId, cfg]) => {
    const isState = cfg.key==='_states';
    html += `<div class="tab-body hidden" id="tab-${tabId}">`;

    if (isState) {
      html += buildStateTab();
    } else {
      html += buildRegTab(tabId, cfg);
    }
    html += `</div>`;
  });

  container.innerHTML = html;

  // Wire state search
  const stateSearchEl = document.getElementById('state-search');
  if (stateSearchEl) stateSearchEl.addEventListener('input', filterStates);

  // Show first tab
  activateTab('upsc');
}

function buildRegTab(tabId, cfg) {
  const items = getBaseItems(tabId);
  const scs   = SUBCATS[tabId] || [];

  // Build sidebar
  let sidebar = `<div class="sidebar" id="sidebar-${tabId}">
    <div class="slabel">Filter</div>
    <div class="sitem active" id="scat-${tabId}-all" onclick="setSubcat('${tabId}','all',this)">
      <div class="sil">
        <div class="siwrap ${cfg.color}"><svg><use href="#${cfg.icon}"/></svg></div>
        <div><div class="sname">All ${cfg.label}</div><div class="scount">${items.length} exams</div></div>
      </div>
      <svg class="sarr"><use href="#s-chevron"/></svg>
    </div>`;

  scs.forEach(sc=>{
    let cnt = items.length;
    if (sc.level) cnt = items.filter(e=>e.level===sc.level).length;
    else if (sc.eligibility) cnt = items.filter(e=>e.eligibility===sc.eligibility).length;
    else if (sc.keys) cnt = items.filter(e=>sc.keys.some(k=>e.name.toLowerCase().includes(k.toLowerCase())||(e.body||'').toLowerCase().includes(k.toLowerCase()))).length;
    sidebar += `<div class="sitem" id="scat-${tabId}-${sc.id}" onclick="setSubcat('${tabId}','${sc.id}',this)">
      <div class="sil">
        <div class="siwrap ${sc.color}"><svg><use href="#${sc.icon}"/></svg></div>
        <div><div class="sname">${sc.label}</div><div class="scount">${cnt} exams</div></div>
      </div>
      <svg class="sarr"><use href="#s-chevron"/></svg>
    </div>`;
  });
  sidebar += `</div>`;

  // Level quick-filter chips
  const levels = [...new Set(items.map(e=>e.level).filter(l=>l&&l!=='nan'))];
  let chips = '';
  if (levels.length > 1) {
    chips = `<div class="filter-row" id="chips-${tabId}">
      <span style="font-size:10px;color:var(--tm);display:flex;align-items:center;gap:4px;padding:5px 0"><svg width="10" height="10"><use href="#s-filter"/></svg>Level:</span>
      ${levels.map(l=>{
        const cls = l==='National'?'tg-blue':l==='State'?'tg-orange':'tg-teal';
        return `<button class="fchip" data-level="${l}" data-tab="${tabId}" onclick="toggleLevelChip(this)">${l}<span class="fchip-count">${items.filter(e=>e.level===l).length}</span></button>`;
      }).join('')}
    </div>`;
  }

  const panel = `<div class="panel" id="panel-${tabId}">
    <div class="phead">
      <div class="picon ${cfg.color}"><svg><use href="#${cfg.icon}"/></svg></div>
      <div>
        <div class="ptit" id="ptit-${tabId}">${cfg.label} — All Exams</div>
        <div class="pdsc">${cfg.desc}</div>
      </div>
      <div class="pcnt" id="pcnt-${tabId}">${items.length} exams</div>
    </div>
    <div class="search-wrap">
      <span class="search-ico"><svg><use href="#s-search"/></svg></span>
      <input class="search-input" id="srch-${tabId}" type="text" placeholder="Search by name, body, eligibility…" oninput="onSearch('${tabId}',this.value)"/>
      <span class="search-cnt" id="scnt-${tabId}"></span>
    </div>
    ${chips}
    <div class="grid-area" id="grid-${tabId}"></div>
  </div>`;

  return sidebar + panel;
}

function buildStateTab() {
  const states = Object.entries(EXAM_DATA._states).sort((a,b)=>a[0].localeCompare(b[0]));
  return `<div class="state-wrap">
    <div class="phead" style="position:static;margin-bottom:18px;padding:0 0 18px">
      <div class="picon ic-purple"><svg><use href="#s-map"/></svg></div>
      <div><div class="ptit">State PSC — 28 States · 224 Exams</div><div class="pdsc">Select a state to view all its PSC, Police, TET, Judiciary and other recruitment exams</div></div>
      <div class="pcnt">224 exams</div>
    </div>
    <div class="state-search-wrap">
      <span class="sstate-ico"><svg><use href="#s-search"/></svg></span>
      <input id="state-search" class="state-search" type="text" placeholder="Search states…"/>
    </div>
    <div class="sgrid" id="sgrid">
      ${states.map(([state,exams])=>`
        <button class="sbtn" data-state="${state}" onclick="selectState('${state}',this)">
          <div class="sbtn-icon"><svg width="12" height="12"><use href="#s-map"/></svg></div>
          <div><div class="sbn">${state}</div><div class="sbc">${exams.length} exams</div></div>
        </button>`).join('')}
    </div>
    <div id="state-panel" class="hidden">
      <div class="se-head">
        <svg width="16" height="16" style="color:var(--acc)"><use href="#s-map"/></svg>
        <div class="se-title" id="se-title">—</div>
        <span class="se-badge" id="se-badge">0</span>
        <button class="se-back" onclick="closeStatePanel()"><svg><use href="#s-chevl"/></svg>All States</button>
      </div>
      <div class="egrid" id="se-grid"></div>
    </div>
  </div>`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────

function activateTab(tabId) {
  activeTab = tabId;
  document.querySelectorAll('.tab-body').forEach(t=>t.classList.add('hidden'));
  const el = document.getElementById('tab-'+tabId);
  if (el) {el.classList.remove('hidden');el.style.display='flex';}
  if (TABS[tabId]?.key !== '_states') {
    if (!activeFilter[tabId]) activeFilter[tabId] = {subcat:'all', search:'', level:null};
    refreshPanel(tabId);
  }
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activateTab(tabId);
}

function setSubcat(tabId, subcatId, el) {
  // Clear active
  document.querySelectorAll(`#sidebar-${tabId} .sitem`).forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  if (!activeFilter[tabId]) activeFilter[tabId] = {};
  activeFilter[tabId].subcat = subcatId;
  // Clear level chips when switching subcat
  document.querySelectorAll(`#chips-${tabId} .fchip`).forEach(c=>c.classList.remove('active'));
  activeFilter[tabId].level = null;
  refreshPanel(tabId);
}

function toggleLevelChip(btn) {
  const tabId = btn.dataset.tab;
  const level = btn.dataset.level;
  if (!activeFilter[tabId]) activeFilter[tabId] = {subcat:'all'};
  const isActive = btn.classList.contains('active');
  // Toggle — one at a time
  document.querySelectorAll(`#chips-${tabId} .fchip`).forEach(c=>c.classList.remove('active'));
  if (!isActive) {
    btn.classList.add('active');
    activeFilter[tabId].levelFilter = level;
  } else {
    activeFilter[tabId].levelFilter = null;
  }
  // Reset subcat to all
  document.querySelectorAll(`#sidebar-${tabId} .sitem`).forEach(s=>s.classList.remove('active'));
  const allBtn = document.getElementById(`scat-${tabId}-all`);
  if (allBtn) allBtn.classList.add('active');
  activeFilter[tabId].subcat = 'all';
  refreshPanel(tabId);
}

function onSearch(tabId, val) {
  if (!activeFilter[tabId]) activeFilter[tabId] = {subcat:'all'};
  activeFilter[tabId].search = val.trim();
  refreshPanel(tabId);
}

function refreshPanel(tabId) {
  const cfg   = TABS[tabId];
  const base  = getBaseItems(tabId);
  const f     = activeFilter[tabId] || {};
  let items   = base;

  // Apply subcat
  if (f.subcat && f.subcat !== 'all') {
    const sc = (SUBCATS[tabId]||[]).find(s=>s.id===f.subcat);
    if (sc) {
      if (sc.level)            items = items.filter(e=>e.level===sc.level);
      else if (sc.eligibility) items = items.filter(e=>e.eligibility===sc.eligibility);
      else if (sc.keys)        items = items.filter(e=>sc.keys.some(k=>
        e.name.toLowerCase().includes(k.toLowerCase())||
        (e.body||'').toLowerCase().includes(k.toLowerCase())
      ));
    }
  }

  // Apply level chip filter
  if (f.levelFilter) {
    items = items.filter(e=>e.level===f.levelFilter);
  }

  // Apply search
  if (f.search) {
    const q = f.search.toLowerCase();
    items = items.filter(e=>
      (e.name||'').toLowerCase().includes(q)||
      (e.body||'').toLowerCase().includes(q)||
      (e.eligibility||'').toLowerCase().includes(q)||
      (e.frequency||'').toLowerCase().includes(q)
    );
  }

  // Update panel header
  const titleEl = document.getElementById('ptit-'+tabId);
  const cntEl   = document.getElementById('pcnt-'+tabId);
  const scntEl  = document.getElementById('scnt-'+tabId);

  if (titleEl) {
    const sc = (SUBCATS[tabId]||[]).find(s=>s.id===f.subcat);
    titleEl.textContent = cfg.label + (sc ? ' — ' + sc.label : ' — All Exams');
  }
  if (cntEl) cntEl.textContent = items.length + ' exam' + (items.length!==1?'s':'');
  if (scntEl) scntEl.textContent = f.search ? items.length + ' found' : '';

  // Render
  const grid = document.getElementById('grid-'+tabId);
  if (grid) renderGrid(items, grid);
}

// State PSC
function selectState(state, btn) {
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const exams = EXAM_DATA._states[state] || [];
  document.getElementById('se-title').textContent = state;
  document.getElementById('se-badge').textContent = exams.length + ' exams';
  const grid = document.getElementById('se-grid');
  grid.innerHTML = exams.map((e,i)=>makeCard(e,i)).join('');
  retrigger(grid);
  document.getElementById('state-panel').classList.remove('hidden');
  document.getElementById('state-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeStatePanel() {
  document.getElementById('state-panel').classList.add('hidden');
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
}

function filterStates() {
  const q = (document.getElementById('state-search').value||'').toLowerCase();
  document.querySelectorAll('.sbtn').forEach(btn=>{
    const name = btn.dataset.state.toLowerCase();
    btn.style.display = name.includes(q) ? '' : 'none';
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
buildAll();
</script>
